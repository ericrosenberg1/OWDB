name: AI Fix

on:
  issues:
    types: [labeled, opened]

jobs:
  fix:
    if: |
      (github.event.action == 'labeled' && github.event.label.name == 'ai-fix') ||
      github.event.action == 'opened'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          direct_prompt: |
            You are an autonomous bug-fix agent. A bug or error has been filed as this
            GitHub issue. Your job is to diagnose and fix it.

            Steps:
            1. Read the issue body carefully — note the error, culprit, and any URLs.
            2. Read CLAUDE.md in this repo for project conventions and the test command.
            3. Locate the file(s) mentioned in the culprit or stack trace.
            4. Understand the root cause before changing anything.
            5. Make the minimal change needed to fix the error.
            6. Run the repo's test command (from CLAUDE.md) and confirm it passes.
            7. Open a draft PR titled "[ai-fix] <brief description>" targeting the default branch.

            Hard constraints:
            - Do NOT edit database migration files.
            - Do NOT hardcode secrets, tokens, or credentials.
            - Do NOT change public API signatures without noting it prominently in the PR.
            - If the fix requires human judgment (e.g. product logic, multi-file architecture
              changes, or you cannot identify the root cause), leave a comment on the issue
              explaining what you found and what decision is needed, then close the PR draft
              with status "needs human review".
            - Keep the PR small — one logical fix per PR.
