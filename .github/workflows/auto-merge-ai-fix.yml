name: Auto-merge AI Fix PRs

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

jobs:
  auto-merge:
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const headSha = context.payload.workflow_run.head_sha;

            // Find open PRs whose head matches this CI run
            const allPrs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 50,
            });

            const aiFixPr = allPrs.data.find(pr =>
              pr.head.sha === headSha &&
              pr.title.startsWith('[ai-fix]') &&
              !pr.draft
            );

            if (!aiFixPr) {
              console.log('No non-draft [ai-fix] PR found for this CI run.');
              return;
            }

            console.log(`Merging PR #${aiFixPr.number}: ${aiFixPr.title}`);
            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: aiFixPr.number,
                merge_method: 'squash',
                commit_title: `${aiFixPr.title} (#${aiFixPr.number})`,
                commit_message: 'Auto-merged by auto-merge-ai-fix workflow after CI passed.',
              });
              console.log(`Merged PR #${aiFixPr.number}`);

              // Comment on the triggering issue so it auto-closes
              const fixesMatch = aiFixPr.body?.match(/(?:Fixes|Closes|Resolves)\s+#(\d+)/i);
              if (fixesMatch) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: parseInt(fixesMatch[1]),
                  body: `✅ Fix merged automatically via PR #${aiFixPr.number} after CI passed.`,
                });
              }
            } catch (e) {
              console.error(`Failed to merge PR #${aiFixPr.number}: ${e.message}`);
              // Leave a comment on the PR explaining the failure
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: aiFixPr.number,
                body: `⚠️ Auto-merge failed: ${e.message}. Please merge manually.`,
              });
            }
