name: Codacy Analysis

on:
  push:
    branches: [main, master]
  schedule:
    - cron: '0 6 * * 1'   # Weekly Monday 6AM UTC

jobs:
  codacy-analysis:
    name: Codacy Analysis
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Run Codacy Analysis CLI
        uses: codacy/codacy-analysis-cli-action@v4
        id: codacy
        continue-on-error: true
        with:
          output: results.sarif
          format: sarif
          gh-code-scanning-compat: true
          max-allowed-issues: 0

      - name: Create GitHub issue if new issues found
        if: steps.codacy.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const sha = context.sha.substring(0, 7);

            // Dedup: skip if an open Codacy issue already exists for this SHA
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'ai-fix',
              state: 'open',
              per_page: 50,
            });
            const alreadyOpen = existing.data.some(i =>
              i.title.includes('[Codacy]') && i.title.includes(sha)
            );
            if (alreadyOpen) {
              console.log('Codacy issue already open for this commit, skipping.');
              return;
            }

            let body = `## Codacy Analysis Found Issues\n\n`;
            body += `**Branch:** \`${context.ref.replace('refs/heads/', '')}\`\n`;
            body += `**Commit:** \`${sha}\`\n`;
            body += `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\n`;

            try {
              const sarif = JSON.parse(fs.readFileSync('results.sarif', 'utf8'));
              const results = sarif.runs?.flatMap(r => r.results || []) || [];
              body += `**Issues found:** ${results.length}\n\n`;
              if (results.length > 0) {
                body += `### Issues\n\n`;
                results.slice(0, 20).forEach(r => {
                  const loc = r.locations?.[0]?.physicalLocation;
                  const file = loc?.artifactLocation?.uri || 'unknown';
                  const line = loc?.region?.startLine || '?';
                  const msg = r.message?.text || '';
                  const rule = r.ruleId || 'unknown';
                  body += `- **${rule}**: ${msg}\n  - \`${file}\` line ${line}\n`;
                });
                if (results.length > 20) {
                  body += `\n_...and ${results.length - 20} more. See the run link above._\n`;
                }
              }
            } catch (e) {
              body += `Could not parse SARIF output. See the [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.\n`;
            }

            body += `\n---\n_Auto-created by Codacy Analysis workflow. The \`ai-fix\` label triggers an autonomous Claude Code fix attempt._`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Codacy] Code quality issues on ${sha}`,
              body,
              labels: ['ai-fix'],
            });
            console.log('Created Codacy issue.');
