[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
# Default ruff rule set (pyflakes + pycodestyle). The CI workflow runs
# `ruff check .`; this config keeps lint useful without forcing intrusive
# rewrites of pre-existing legacy code.
select = ["E", "F", "W"]
# Forward-reference type annotations in quoted strings are common across
# the wrestlebot pipeline (e.g. `def _record_list_page_fetch(...) -> "SourceFetch"`)
# to avoid circular imports. Ruff reports these as F821 (undefined name) even
# though `from __future__ import annotations` is imported. Trust the existing
# pattern and don't burn cycles rewriting them.
ignore = ["E501"]  # line length is already capped by the formatter

[tool.ruff.lint.per-file-ignores]
# Pre-existing files that use string-quoted forward references for
# type annotations to avoid circular imports — Django models referenced
# from pipeline / scraper modules. The patterns are intentional.
"owdb_django/wrestlebot/pipeline/event_lists.py" = ["F821"]
"owdb_django/wrestlebot/pipeline/wrestler_linking.py" = ["F821"]
"owdb_django/wrestlebot/pipeline/match_extract.py" = ["F841"]
"owdb_django/owdbapp/scrapers/base.py" = ["F841"]
"owdb_django/owdbapp/scrapers/cagematch.py" = ["F821"]
# views.py has a `# noqa`-style end-of-file import block for routes that
# need to be defined after the main view classes. Moving them violates
# the model the file has carried since the start.
"owdb_django/owdbapp/views.py" = ["E402"]
# agents/tools.py — the tool dispatch tables use `key: fn; ...` semicolons
# intentionally for compactness. Ruff flags as E702.
"owdb_django/wrestlebot/agents/tools.py" = ["E702"]
# Re-export modules: __init__.py files importing types for the public
# API trigger F401 unless added to __all__. Existing pattern relies on
# implicit re-export; the test suite verifies the import surface.
"owdb_django/wrestlebot/sources/__init__.py" = ["F401"]
# Tests sometimes import-then-shadow models for clarity. The unused
# imports are documented and intentional in test scaffolding.
"owdb_django/wrestlebot/tests/*.py" = ["F401", "F811", "F841"]
# commons.py has bottom-of-file imports for lazy modules that would create
# a cycle if imported at the top.
"owdb_django/wrestlebot/sources/commons.py" = ["E402"]
"owdb_django/wrestlebot/sources/cagematch.py" = ["F841"]
"owdb_django/wrestlebot/sources/profightdb.py" = ["E741"]
# scripts/ contains Django-setup-required runners — `django.setup()` must
# precede the model imports.
"scripts/*.py" = ["E402"]
# Trailing-newline cleanup is a generated-file artifact, not a real bug.
"owdb_django/owdbapp/tasks.py" = ["W292"]
